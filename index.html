<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hey Prakruti 🍽️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      display: none;
      min-height: 100vh;
      width: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .page.active { display: flex; }

    .emoji { font-size: 72px; margin-bottom: 1.5rem; }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.6rem;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .btn-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 13px 36px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, opacity 0.1s;
    }

    .btn:active { transform: scale(0.96); }

    .btn-yes { background: #D85A30; color: #fff; }
    .btn-yes:hover { opacity: 0.88; }

    .btn-no { background: #f0f0f0; color: #333; }
    .btn-no:hover { background: #e0e0e0; }

    .btn-try { background: #533AB7; color: #fff; }
    .btn-try:hover { opacity: 0.88; }

    .video-wrap {
      width: 100%;
      max-width: 400px;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .video-wrap iframe {
      width: 100%;
      height: 225px;
      display: block;
      border: none;
    }

    .hearts {
      font-size: 38px;
      letter-spacing: 8px;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <!-- Page 1: The ask -->
  <div class="page active" id="page1">
    <div class="emoji">🍽️</div>
    <h1>Hey Prakruti,</h1>
    <p>Let's go for dinner? 🥺<br>Choose wisely.</p>
    <div class="btn-row">
      <button class="btn btn-yes" onclick="showPage('page3')">Accept 💖</button>
      <button class="btn btn-no" onclick="showPage('page2')">Reject 🚫</button>
    </div>
  </div>

  <!-- Page 2: How dare you -->
  <div class="page" id="page2">
    <div class="emoji">😤</div>
    <h1>How dare you..?</h1>
    <p>That was the wrong choice.<br>Go back and think again. 😠</p>
    <div class="btn-row">
      <button class="btn btn-try" onclick="showPage('page1')">Try again 🔄</button>
    </div>
  </div>

  <!-- Page 3: She said yes! -->
  <div class="page" id="page3">
    <div class="hearts">❤️ 🧡 💛</div>
    <h1>Yesss! You said yes! 🥳</h1>
    <p>I knew you would make the right choice 😏</p>
    <div class="video-wrap">
      <iframe
        src="https://youtube.com/shorts/LVbri3nH0O8?si=Jp2_TgIcJvpBPHyS"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>

</body>
</html>
